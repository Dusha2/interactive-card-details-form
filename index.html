<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <meta name="description" content="Securely enter your credit card details to complete your purchase. Fast and safe payment processing.">

    <meta property="og:title" content="Secure Payment | Enter Your Card Details">
    <meta property="og:description" content="Securely enter your credit card details to complete your purchase.">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="./dist/css/main.css">
</head>

<body>
    <main>
        <section class="container">
            <h1 class="visually-hidden">Payment Details Form</h1>
            <div class="card" aria-hidden="true">
                <div class="card-front">
                    <div class="card-logo">
                        <span class="circle--filled"></span>
                        <span class="circle--outlined"></span>
                    </div>
                    <div class="card-number">
                        <span>0000</span>
                        <span>0000</span>
                        <span>0000</span>
                        <span>0000</span>
                    </div>
                    <div class="card-details">
                        <span class="card-name">JANE APPLESEED</span>
                        <span class="date">00/00</span>
                    </div>
                </div>
                <div class="card-back">
                    <span class="card-cvc">000</span>
                </div>
            </div>
            <form action="" class="form">
                <fieldset class="form-content">
                    <legend class="visually-hidden">Дані платіжної картки</legend>

                    <div class="form-group">
                        <label for="name">Cardholder Name</label>
                        <input 
                            type="text" 
                            name="name" 
                            id="name" 
                            placeholder="e.g. Jane Appleseed"
                            autocomplete="cc-name"
                            required
                            oninvalid="this.setCustomValidity('Гей, ти забув ввести своє ім\'я!')"
                            oninput="this.setCustomValidity('')">
                    </div>
                    <div class="form-group">
                        <label for="number">Card Number</label>
                        <input 
                            type="number" 
                            name="number" 
                            id="number"
                            placeholder="e.g. 1234 5678 9123 0000"
                            autocomplete="cc-number"
                            required
                            oninvalid="this.setCustomValidity('Номер картки не може бути порожнім')"
                            oninput="this.setCustomValidity(''); if(this.value.length > 16) this.value = this.value.slice(0, 16);">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="month">EXP. DATE (MM/YY)</label>
                            <div class="date-inputs">
                                <input 
                                    type="number" 
                                    name="month" 
                                    id="month"
                                    placeholder="MM"
                                    aria-label="Expiration month"
                                    autocomplete="cc-exp-month"
                                    required
                                    oninvalid="this.setCustomValidity('Вкажіть місяць')"
                                    oninput="this.setCustomValidity(''); if(this.value.length > 2) this.value = this.value.slice(0, 2);">
                                <input 
                                    type="number" 
                                    name="year" 
                                    id="year"
                                    placeholder="YY"
                                    aria-label="Expiration year"
                                    autocomplete="cc-exp-year"
                                    required
                                    oninvalid="this.setCustomValidity('Вкажіть рік')"
                                    oninput="this.setCustomValidity(''); if(this.value.length > 2) this.value = this.value.slice(0, 2);">
                            </div>
                        </div>
                        <div class="form-group cvc">
                            <label for="cvc">CVC</label>
                            <input 
                                type="number" 
                                name="cvc" 
                                id="cvc" 
                                placeholder="e.g. 123"
                                aria-label="Security code"
                                autocomplete="cc-csc"
                                required
                                oninvalid="this.setCustomValidity('CVC код не може бути порожнім')"
                                oninput="this.setCustomValidity(''); if(this.value.length > 3) this.value = this.value.slice(0, 3);">
                        </div>
                    </div>
                </а>
                <button type="submit">Confirm</button>
            </form>
        </section>
    </main>
</body>

</html>
